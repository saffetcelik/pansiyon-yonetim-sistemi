version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pansiyon-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Exposing the port internally within the docker network
    expose:
      - "5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pansiyon-backend
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_HTTP_PORTS=${ASPNETCORE_HTTP_PORTS:-8080}
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=$POSTGRES_DB;Username=$POSTGRES_USER;Password=$POSTGRES_PASSWORD
    depends_on:
      - db
    expose:
      - "8080" # Coolify will use this port or whichever ASPNETCORE_HTTP_PORTS is set to

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pansiyon-frontend
    restart: always
    depends_on:
      - backend
    expose:
      - "80" # Nginx runs on 80 by default

volumes:
  pgdata:
